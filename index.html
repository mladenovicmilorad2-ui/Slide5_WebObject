<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connections Game - Vanilla JS</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <div class="wrapper sm center">
        <h1 id="game-title" class="fader">Create four groups of four!</h1>

        <!-- Completed groups will be inserted here -->
        <div id="completed-groups"></div>

        <!-- Message area -->
        <p id="message" class="center"></p>

        <!-- Word grid -->
        <div id="word-grid" class="grid-container fader"></div>

        <!-- Guesses remaining counter -->
        <div id="mistakes" class="mistakes fader">
          <span id="guesses-text">Guesses Remaining:</span>
          <span id="guesses-count">4</span>
          <div class="mistake-holder" id="mistake-holder"></div>
        </div>

        <!-- Game buttons -->
        <div id="game-buttons" class="btn-row center fader">
          <button id="shuffle-btn" class="btn sm">Shuffle</button>
          <button id="deselect-btn" class="btn sm">Deselect All</button>
          <button id="submit-btn" class="btn">Submit</button>
        </div>
      </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="connections.js"></script>
  </body>
</html>
